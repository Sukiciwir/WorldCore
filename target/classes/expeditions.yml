        material: DIAMOND
        amount: 3
        chance: 60
      - type: ITEM
        material: EMERALD
        amount: 2
        chance: 40
      - type: ITEM
        material: IRON_INGOT
        amount: 32
        chance: 100
      - type: CRATE_KEY
        crate: winter_crate
        amount: 2
        chance: 20

  # ─── Summer Expeditions ──────────────────────────────────────────
  - id: desert_treasure
    name: "<yellow>🏜 Desert Treasure Hunt"
