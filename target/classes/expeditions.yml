# WorldCore Expeditions
# ──────────────────────────────────────────────────────────────────
# Each expedition has:
#   id:           Unique key (lowercase, no spaces)
#   name:         Display name (MiniMessage supported)
#   description:  Short description
#   category:     MINING, FISHING, EXPLORATION, TREASURE, COMBAT, SEASONAL, EVENT, CUSTOM
#   world-states: List of state IDs this expedition is available for (empty = always)
#   duration-seconds: Duration in seconds
#   costs:        List of cost items (type: MONEY/VAULT/PLAYER_POINTS/ITEM)
#   rewards:      List of reward items (type: MONEY/ITEM/CRATE_KEY)
# ──────────────────────────────────────────────────────────────────

expeditions:

  # ─── Always Available ────────────────────────────────────────────
  - id: basic_mining
    name: "<gray>⛏ Basic Mining Run"
    description: "A short trip to the mines."
    category: MINING
    world-states: []
    duration-seconds: 3600
    costs:
      - type: MONEY
        amount: 500
    rewards:
      - type: ITEM
        material: IRON_ORE
        amount: 16
        chance: 100
      - type: ITEM
        material: COAL
        amount: 32
        chance: 80
      - type: MONEY
        amount: 250
        chance: 50

  - id: basic_fishing
    name: "<aqua>🎣 Basic Fishing Trip"
    description: "Head to the local river for a catch."
    category: FISHING
    world-states: []
    duration-seconds: 5400
    costs:
      - type: MONEY
        amount: 300
    rewards:
      - type: ITEM
        material: COD
        amount: 8
        chance: 100
      - type: ITEM
        material: SALMON
        amount: 4
        chance: 60
      - type: MONEY
        amount: 150
        chance: 40

  # ─── Winter Expeditions ──────────────────────────────────────────
  - id: frozen_lake
    name: "<aqua>❄ Frozen Lake Expedition"
    description: "Brave the frozen lake for rare fish and icy treasures."
    category: SEASONAL
    world-states: [ winter ]
    duration-seconds: 14400
    costs:
      - type: MONEY
        amount: 5000
      # OR alternative: 64 packed ice
      - type: ITEM
        material: PACKED_ICE
        amount: 64
    rewards:
      - type: ITEM
        material: COD
        amount: 16
        chance: 100
      - type: ITEM
        material: SALMON
        amount: 8
        chance: 80
      - type: ITEM
        material: DIAMOND
        amount: 1
        chance: 25
      - type: CRATE_KEY
        crate: winter_crate
        amount: 1
        chance: 30

  - id: ice_cave_spelunking
    name: "<blue>🧊 Ice Cave Spelunking"
    description: "Explore the deep ice caves for rare ores."
    category: MINING
    world-states: [ winter ]
    duration-seconds: 21600
    costs:
      - type: MONEY
        amount: 8000
    rewards:
