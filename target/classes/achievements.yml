# WorldCore Achievements
# ──────────────────────────────────────────────────────────────────
# Each achievement has:
#   id:           Unique key (lowercase, no spaces)
#   name:         Display name (MiniMessage supported)
#   description:  Description shown in GUI
#   category:     COMBAT / ECONOMY / CRATES / AUCTION / FISHING /
#                 QUEST / PLAYTIME / SHOPS / EXPEDITION / HALL_OF_FAME /
#                 DISCOVERY / TOWNY / SEASONAL / EVENT / CUSTOM
#   type:         INCREMENTAL (progress) or ONE_SHOT (instant unlock)
#   target:       Required progress value (for INCREMENTAL)
#   world-states: State IDs required (empty = any state)
#   title-reward: Title ID to award on unlock (optional)
#   icon:         Item material for GUI display
# ──────────────────────────────────────────────────────────────────

