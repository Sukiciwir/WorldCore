# WorldCore Titles
# ──────────────────────────────────────────────────────────────────
# Each title has:
#   id:           Unique key
#   display:      Display name (shown in GUI, MiniMessage)
#   prefix:       Chat/TAB prefix (MiniMessage)
#   description:  How to unlock
#   seasonal:     true = can expire after season ends
# ──────────────────────────────────────────────────────────────────

titles:
  dragon_slayer:
    display: "<dark_purple>🐉 Dragon Slayer"
    prefix: "<dark_purple>[Dragon Slayer]</dark_purple> "
    description: "Awarded for defeating the Ender Dragon as first discoverer."
    seasonal: false

  winter_survivor:
    display: "<aqua>❄ Winter Survivor"
    prefix: "<aqua>[Winter Survivor]</aqua> "
    description: "Complete 5 expeditions during winter."
    seasonal: true

  summer_fisher:
    display: "<yellow>☀ Summer Fisher"
    prefix: "<yellow>[Summer Fisher]</yellow> "
    description: "Complete 5 fishing expeditions during summer."
    seasonal: true

  autumn_merchant:
